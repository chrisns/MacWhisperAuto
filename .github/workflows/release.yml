name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        uses: lukaszraczylo/semver-generator@5f205e98567f537739f06c0254705ea2414cfaec # v1
        with:
          config_file: semver.yaml
          repository_local: true
          strict: true

      - name: Build .app bundle
        run: scripts/build.sh

      - name: Zip .app bundle
        run: |
          cd build
          zip -r MacWhisperAuto.app.zip MacWhisperAuto.app

      - name: Zip browser extension
        run: zip -r MacWhisperAuto-Extension.zip Extension/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.semantic_version }}" \
            build/MacWhisperAuto.app.zip \
            MacWhisperAuto-Extension.zip \
            --title "MacWhisperAuto v${{ steps.version.outputs.semantic_version }}" \
            --generate-notes \
            --target "${{ github.sha }}"
